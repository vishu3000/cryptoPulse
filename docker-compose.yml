services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cryptopulse
      POSTGRES_PASSWORD: cryptopulse
      POSTGRES_DB: cryptopulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/init.sql:/docker-entrypoint-initdb.d/01-schema.sql

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  pgdata:
